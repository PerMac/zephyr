common:
  tags: mcuboot rsa
  multi_build:
    - name: bootloader
      path: ../../../../../bootloader/mcuboot/boot/zephyr
      extra_args: OVERLAY_CONFIG=../../samples/zephyr/overlay-rsa.conf
    - name: hello1
      path: ../hello-world
    - name: hello2
      path: ../hello-world

tests:
  mcuboot.rsa.good:
    integration_platforms:
      - nrf52dk_nrf52832
    stages:
      - CallScripts:
        - "west sign -d twister-out/nrf52dk_nrf52832/tests/ztest/multi_build/tests/mcuboot.rsa.good/hello1
        -H zephyr.hex -t imgtool -p /home/maciej/zephyrproject2/bootloader/mcuboot/scripts/imgtool.py --
        --key /home/maciej/zephyrproject2/bootloader/mcuboot/root-rsa-2048.pem"
      - WestSign:
          image: hello2
          key: /home/maciej/zephyrproject2/bootloader/mcuboot/root-rsa-2048.pem

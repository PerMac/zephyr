common:
  timeout: 9999
  tags: mcuboot rsa
  multi_build:
    - name: bootloader
      path: ../../../../../bootloader/mcuboot/boot/zephyr
      extra_args: OVERLAY_CONFIG=../../samples/zephyr/overlay-rsa.conf
    - name: hello1
      path: ../hello-world
    - name: hello2
      path: ../hello-world

tests:
  mcuboot.rsa.good:
    integration_platforms:
      - nrf52dk_nrf52832
    stages:
      - WestSign:
          image: hello1
          key: /home/maciej/zephyrproject2/bootloader/mcuboot/root-rsa-2048.pem
      - WestSign:
          image: hello2
          key: /home/maciej/zephyrproject2/bootloader/mcuboot/root-rsa-2048.pem
      - OnTarget:
          image: bootloader
          harness: console
          harness_config:
            type: one_line
            regex:
              - "I: Starting bootloader"
      - OnTarget:
          image: hello1
          harness: console
          harness_config:
            type: multi_line
            regex:
              - "I: Starting bootloader"
